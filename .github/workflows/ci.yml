name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native:
    name: native ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, runner: ubuntu-latest }
          - { arch: arm64, runner: ubuntu-24.04-arm }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true
          cache: true

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Taskfile ci
        run: task ci

  emulated:
    name: emulated ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: riscv64, image: "debian:trixie",               qemu: "rv64,v=true,vlen=128" }
          - { arch: loong64, image: "ghcr.io/loong64/debian:trixie", qemu: "la464" }
          - { arch: ppc64le, image: "debian:trixie",               qemu: "power9" }
          - { arch: s390x,   image: "debian:trixie",               qemu: "qemu" }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true
          cache: true

      - name: Register QEMU binfmt handlers
        run: docker run --privileged --rm tonistiigi/binfmt --install all

      # The native `task test` runs `go test -coverpkg=$pkg $pkg` for every
      # sub-package separately (a single `-coverpkg=./... ./...` only profiles
      # the last package). We mirror that here by cross-compiling one test
      # binary per package (`go test -c` defaults -cover to the package under
      # test) and running each under QEMU, then gating own-package coverage at
      # 100%. `-race` is dropped because it requires cgo, which is incompatible
      # with the static CGO_ENABLED=0 cross-build needed for emulation.
      - name: Build + run + gate coverage (per package) under QEMU
        run: |
          set -eu
          fail=0
          for pkg in $(go list ./...); do
            name=$(echo "$pkg" | tr '/' '_')
            echo "::group::$pkg"
            CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.arch }} \
              go test -c -cover -o "/tmp/${name}.test" "$pkg"
            docker run --rm --platform linux/${{ matrix.arch }} \
              -e QEMU_CPU=${{ matrix.qemu }} -v /tmp:/t \
              ${{ matrix.image }} "/t/${name}.test" \
              -test.v -test.count=1 -test.coverprofile="/t/${name}.cov"
            pct=$(go tool cover -func="/tmp/${name}.cov" | awk '/^total:/{print $3}')
            echo "coverage[$pkg]=$pct"
            [ "$pct" = "100.0%" ] || { echo "coverage below 100% for $pkg"; fail=1; }
            echo "::endgroup::"
          done
          [ "$fail" = "0" ] || { echo "one or more packages below 100% coverage"; exit 1; }
